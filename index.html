<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng Nhập - Proxy Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md">
        <div class="bg-white/95 backdrop-blur-sm rounded-3xl shadow-2xl p-8 border border-white/20">
            <div class="text-center mb-8">
                <div class="w-20 h-20 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fa-solid fa-user-secret text-3xl text-white"></i>
                </div>
                <h2 class="text-2xl font-bold text-gray-800">Proxy Store</h2>
                <p class="text-xs text-gray-400 mt-1">Tài khoản Proxy chất lượng cao</p>
            </div>

            <button id="google-login" class="w-full py-3 bg-white border border-gray-200 hover:bg-gray-50 active:scale-98 text-gray-700 rounded-xl font-medium text-sm transition-all shadow-sm cursor-pointer flex items-center justify-center gap-3">
                <img src="https://www.google.com/favicon.ico" class="w-5 h-5" alt="Google">
                Tiếp tục với Google
            </button>

            <div class="mt-6 text-center">
                <p class="text-[10px] text-gray-400">
                    Bằng cách đăng nhập, bạn đồng ý với <span class="text-blue-500">Điều khoản dịch vụ</span>
                </p>
            </div>
        </div>
    </div>

    <div id="loading-modal" class="fixed inset-0 z-50 hidden bg-black/50 backdrop-blur-sm flex items-center justify-center">
        <div class="bg-white rounded-2xl p-6 w-64 text-center">
            <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-3"></div>
            <p class="text-sm font-semibold text-gray-700">Đang xử lý...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCO4z_CJBNbL6-JWXS42foF6dwKVQj403I",
            authDomain: "proxy-275.firebaseapp.com",
            projectId: "proxy-275",
            storageBucket: "proxy-275.firebasestorage.app",
            messagingSenderId: "1019852776299",
            appId: "1:1019852776299:web:f82f681236bc42e16ea22e",
            measurementId: "G-HZBBYKZKRD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loadingModal = document.getElementById('loading-modal');
        const googleBtn = document.getElementById('google-login');

        function showLoading() {
            loadingModal.classList.remove('hidden');
        }

        function hideLoading() {
            loadingModal.classList.add('hidden');
        }

        googleBtn.onclick = async () => {
            showLoading();
            try {
                const result = await signInWithPopup(auth, provider);
                const email = result.user.email;
                const displayName = result.user.displayName;
                
                localStorage.setItem('user_email', email);
                localStorage.setItem('user_name', displayName);
                
                window.location.href = 'dashboard.html';
            } catch (error) {
                hideLoading();
                alert('Đăng nhập thất bại: ' + error.message);
            }
        };

        if (localStorage.getItem('user_email')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
