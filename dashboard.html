<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Proxy Store - Mua Tài Khoản VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        .animate-pulse-slow {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .animate-spin-custom {
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen">

    <nav class="bg-white/10 backdrop-blur-md border-b border-white/20 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-br from-blue-500 to-purple-600 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-user-secret text-white text-sm"></i>
                    </div>
                    <span class="text-white font-bold text-sm">PROXY VIP</span>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-white/80 text-xs" id="user-email-display">loading...</span>
                    <button onclick="logout()" class="w-8 h-8 bg-white/10 hover:bg-red-500/30 rounded-xl transition-all flex items-center justify-center">
                        <i class="fa-solid fa-sign-out-alt text-white text-xs"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-white mb-2">Tài Khoản VIP</h1>
            <p class="text-white/60 text-sm">Chọn gói phù hợp với nhu cầu của bạn</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 max-w-6xl mx-auto">
            <!-- Gói 3 ngày -->
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border border-white/20 hover:border-blue-500 transition-all">
                <div class="text-center">
                    <div class="w-12 h-12 bg-blue-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-calendar-day text-blue-400 text-xl"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg">3 NGÀY</h3>
                    <p class="text-2xl font-bold text-yellow-400 mt-2">40.000đ</p>
                    <button onclick="showQR(40000, '3 NGÀY')" class="w-full mt-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white rounded-xl text-sm font-semibold transition-all">
                        Mua ngay
                    </button>
                </div>
            </div>

            <!-- Gói 4 ngày -->
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border border-white/20 hover:border-blue-500 transition-all">
                <div class="text-center">
                    <div class="w-12 h-12 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-calendar-week text-green-400 text-xl"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg">4 NGÀY</h3>
                    <p class="text-2xl font-bold text-yellow-400 mt-2">60.000đ</p>
                    <button onclick="showQR(60000, '4 NGÀY')" class="w-full mt-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white rounded-xl text-sm font-semibold transition-all">
                        Mua ngay
                    </button>
                </div>
            </div>

            <!-- Gói 20 ngày -->
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border border-white/20 hover:border-blue-500 transition-all">
                <div class="text-center">
                    <div class="w-12 h-12 bg-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-calendar-alt text-purple-400 text-xl"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg">20 NGÀY</h3>
                    <p class="text-2xl font-bold text-yellow-400 mt-2">100.000đ</p>
                    <button onclick="showQR(100000, '20 NGÀY')" class="w-full mt-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white rounded-xl text-sm font-semibold transition-all">
                        Mua ngay
                    </button>
                </div>
            </div>

            <!-- Gói 30 ngày -->
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border border-white/20 hover:border-blue-500 transition-all">
                <div class="text-center">
                    <div class="w-12 h-12 bg-orange-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-calendar-check text-orange-400 text-xl"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg">30 NGÀY</h3>
                    <p class="text-2xl font-bold text-yellow-400 mt-2">120.000đ</p>
                    <button onclick="showQR(120000, '30 NGÀY')" class="w-full mt-4 py-2 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white rounded-xl text-sm font-semibold transition-all">
                        Mua ngay
                    </button>
                </div>
            </div>

            <!-- Gói 1 OB -->
            <div class="bg-white/10 backdrop-blur-sm rounded-2xl p-5 border-2 border-yellow-500/50 hover:border-yellow-400 transition-all relative">
                <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black text-[9px] font-bold px-2 py-0.5 rounded-full">HOT</div>
                <div class="text-center">
                    <div class="w-12 h-12 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-3">
                        <i class="fa-solid fa-crown text-red-400 text-xl"></i>
                    </div>
                    <h3 class="text-white font-bold text-lg">1 OB</h3>
                    <p class="text-2xl font-bold text-yellow-400 mt-2">300.000đ</p>
                    <button onclick="showQR(300000, '1 OB')" class="w-full mt-4 py-2 bg-gradient-to-r from-yellow-500 to-orange-600 hover:from-yellow-600 hover:to-orange-700 text-white rounded-xl text-sm font-semibold transition-all">
                        Mua ngay
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal QR -->
    <div id="qr-modal" class="fixed inset-0 z-50 hidden bg-black/80 backdrop-blur-md flex items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl max-w-sm w-full p-6 transform scale-95 transition-transform duration-300">
            <div class="text-center mb-4">
                <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-2">
                    <i class="fa-solid fa-qrcode text-blue-600 text-xl"></i>
                </div>
                <h3 class="text-lg font-bold text-gray-800">Thanh toán QR</h3>
                <p class="text-xs text-gray-500">Quét mã QR để chuyển khoản</p>
            </div>

            <div id="qr-loading" class="flex flex-col items-center justify-center py-8">
                <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin-custom mb-3"></div>
                <p class="text-sm text-gray-500">Đang tạo mã QR...</p>
            </div>

            <div id="qr-content" class="hidden">
                <div class="bg-gray-100 p-4 rounded-xl mb-4">
                    <img id="qr-img" class="w-48 h-48 mx-auto object-contain" alt="QR Code">
                </div>

                <div class="space-y-3 text-sm">
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span class="text-gray-500">Ngân hàng</span>
                        <span class="font-bold text-gray-800">Viettinbank</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                        <span class="text-gray-500">Số tài khoản</span>
                        <div class="flex items-center gap-2">
                            <span class="font-bold text-gray-800">888890895666</span>
                            <button onclick="copyText('888890895666')" class="text-blue-500 hover:text-blue-700">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-500">Nội dung</span>
                        <div class="flex items-center gap-2">
                            <span id="memo-text" class="font-bold text-red-600 text-xs break-all max-w-[180px]"></span>
                            <button onclick="copyText(document.getElementById('memo-text').innerText)" class="text-blue-500 hover:text-blue-700 flex-shrink-0">
                                <i class="fa-regular fa-copy"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <button onclick="closeQRModal()" class="w-full mt-5 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-xl font-semibold text-sm transition-all">
                Đóng
            </button>
        </div>
    </div>

    <script>
        let currentAmount = 0;
        let currentProduct = '';

        const userEmail = localStorage.getItem('user_email');
        if (!userEmail) {
            window.location.href = 'index.html';
        }

        document.getElementById('user-email-display').innerText = userEmail || 'user';

        function showQR(amount, product) {
            currentAmount = amount;
            currentProduct = product;

            const modal = document.getElementById('qr-modal');
            const qrLoading = document.getElementById('qr-loading');
            const qrContent = document.getElementById('qr-content');
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);

            qrLoading.classList.remove('hidden');
            qrContent.classList.add('hidden');

            const memo = userEmail;
            document.getElementById('memo-text').innerText = memo;

            const qrUrl = `https://img.vietqr.io/image/VTB-888890895666-compact2.png?amount=${amount}&addInfo=${encodeURIComponent(memo)}`;
            const qrImg = document.getElementById('qr-img');
            
            qrImg.onload = () => {
                setTimeout(() => {
                    qrLoading.classList.add('hidden');
                    qrContent.classList.remove('hidden');
                }, 500);
            };
            
            qrImg.onerror = () => {
                qrImg.src = 'https://via.placeholder.com/200?text=QR+Error';
                setTimeout(() => {
                    qrLoading.classList.add('hidden');
                    qrContent.classList.remove('hidden');
                }, 500);
            };
            
            qrImg.src = qrUrl;

            const history = JSON.parse(localStorage.getItem('purchase_history') || '[]');
            history.push({
                email: userEmail,
                product: product,
                amount: amount,
                timestamp: Date.now(),
                status: 'pending'
            });
            localStorage.setItem('purchase_history', JSON.stringify(history));
        }

        function closeQRModal() {
            const modal = document.getElementById('qr-modal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text);
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-gray-900 text-white text-xs px-4 py-2 rounded-full z-50';
            toast.innerText = 'Đã sao chép!';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1500);
        }

        function logout() {
            localStorage.removeItem('user_email');
            localStorage.removeItem('user_name');
            window.location.href = 'index.html';
        }

        window.onload = () => {
            if (!localStorage.getItem('user_email')) {
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
